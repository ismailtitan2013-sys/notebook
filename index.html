<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Новая вкладка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .opacity-0 { opacity: 0 !important; }
        
        body { background-color: #0f172a; color: white; margin: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #fake-screen {
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .tab-btn { transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { background-color: rgba(255, 255, 255, 0.1); border-bottom: 2px solid #a855f7; color: #a855f7; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .pinned-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.5) !important; }
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        @media (max-width: 640px) {
            .mobile-header { flex-direction: column; gap: 10px; align-items: stretch; }
            .mobile-header-tools { justify-content: space-between; width: 100%; }
            .mobile-input-area { padding: 15px; }
            .mobile-tools-row { flex-direction: column; gap: 15px; align-items: stretch; }
            .color-dot { width: 28px; height: 28px; }
            .mobile-action-btns { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden h-screen w-screen selection:bg-purple-500 selection:text-white flex flex-col">

    <!-- ЛОЖНЫЙ ЭКРАН -->
    <div id="fake-screen" class="absolute inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-300 hidden opacity-0">
        <div id="secret-return-btn" class="absolute top-0 left-0 w-24 h-24 cursor-default z-[101]"></div>
        <div class="text-center bg-black/40 p-8 sm:p-10 rounded-3xl backdrop-blur-md shadow-2xl mx-4">
            <h1 id="fake-time" class="text-6xl sm:text-8xl font-thin text-white mb-2 tracking-wider">00:00</h1>
            <p id="fake-date" class="text-xl sm:text-2xl text-white/80 font-light">Понедельник, 1 января</p>
        </div>
    </div>

    <!-- ЭКРАН ВВОДА ПАРОЛЯ -->
    <div id="lock-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-50 transition-opacity duration-300">
        <div class="bg-slate-800/50 p-6 sm:p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 border border-slate-700/50 text-center backdrop-blur-sm">
            <div class="w-16 h-16 sm:w-20 sm:h-20 bg-slate-700/50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <span class="text-3xl sm:text-4xl">🔒</span>
            </div>
            <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-slate-100">Доступ закрыт</h2>
            <input type="password" id="password-input" placeholder="Введите пароль..." 
                   class="w-full bg-slate-900/50 border border-slate-600/50 rounded-2xl px-5 py-4 text-white text-center text-lg focus:outline-none focus:border-purple-500 transition-all placeholder-slate-500">
            <p class="text-sm text-slate-400 mt-5 hidden sm:block">Нажмите Enter для входа</p>
            <button id="mobile-login-btn" class="w-full mt-4 bg-purple-600 text-white rounded-xl py-3 font-bold text-lg sm:hidden">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-app" class="h-full flex flex-col max-w-5xl mx-auto w-full p-2 sm:p-6 opacity-0 transition-opacity duration-500">
        
        <!-- Шапка -->
        <div class="flex items-center justify-between mb-4 bg-slate-800/80 rounded-2xl sm:rounded-3xl p-2 sm:p-3 shadow-xl backdrop-blur-sm border border-slate-700/30 mobile-header">
            <div class="flex space-x-1 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                <button id="tab-diary" class="tab-btn active px-4 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl font-semibold text-base sm:text-lg flex items-center gap-2 flex-1 sm:flex-none justify-center">
                    <span>📝</span> Дневник
                </button>
                <button id="tab-chat" class="tab-btn px-4 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl font-semibold text-base sm:text-lg text-slate-400 flex items-center gap-2 flex-1 sm:flex-none justify-center">
                    <span>🤖</span> ИИ-Друг
                </button>
            </div>
            <div class="flex items-center gap-2 sm:gap-6 px-2 mobile-header-tools">
                <div class="flex gap-1">
                    <button onclick="window.exportSecrets()" class="p-2 text-slate-400 hover:text-purple-400 rounded-lg bg-slate-700/30">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-7.5-6L12 5.25m0 0L10.5 10.5M12 5.25v9" /></svg>
                    </button>
                    <button onclick="document.getElementById('import-file').click()" class="p-2 text-slate-400 hover:text-blue-400 rounded-lg bg-slate-700/30">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    </button>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="window.importSecrets(this.files[0])">
                </div>
                <span id="sync-status" class="text-xs sm:text-sm text-slate-400 flex items-center gap-1.5 bg-slate-900/50 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-slate-500 shadow-lg shadow-slate-500/50"></span> Локально
                </span>
                <button onclick="window.hideVault()" class="text-slate-400 hover:text-red-400 p-2 bg-slate-700/50 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        </div>

        <!-- ДНЕВНИК -->
        <div id="view-diary" class="flex-1 flex flex-col gap-4 sm:gap-6 overflow-hidden">
            <!-- Поле ввода -->
            <div class="bg-slate-800/80 p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-xl border border-slate-700/50 flex-shrink-0 relative backdrop-blur-sm mobile-input-area">
                <input type="text" id="secret-title" placeholder="Заголовок" class="w-full bg-transparent text-lg sm:text-xl font-bold text-white mb-2 sm:mb-3 focus:outline-none placeholder-slate-500">
                <textarea id="secret-input" placeholder="Начни печатать..." rows="3" class="w-full bg-transparent text-slate-200 text-base sm:text-lg resize-none focus:outline-none placeholder-slate-600 leading-relaxed"></textarea>
                
                <div class="flex items-center justify-between mt-3 sm:mt-4 pt-3 sm:pt-4 border-t border-slate-700/50 mobile-tools-row">
                    <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                        <div class="flex gap-2 sm:gap-3" id="color-picker">
                            <div class="color-dot active bg-slate-700" data-color="bg-slate-700"></div>
                            <div class="color-dot bg-rose-600" data-color="bg-rose-600"></div>
                            <div class="color-dot bg-blue-600" data-color="bg-blue-600"></div>
                            <div class="color-dot bg-emerald-600" data-color="bg-emerald-600"></div>
                            <div class="color-dot bg-amber-500" data-color="bg-amber-500"></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="auto-fix-status" class="text-xs text-yellow-400 font-medium hidden animate-pulse">✨ Улучшаю...</span>
                            <span id="char-count" class="text-xs sm:text-sm text-slate-500 hidden sm:block">0</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 sm:gap-3 mobile-action-btns">
                        <button id="mic-btn" class="p-3 sm:p-3 rounded-xl bg-slate-700/50 text-slate-300 flex-1 sm:flex-none flex justify-center items-center">🎤</button>
                        <button id="ai-fix-btn" class="p-3 sm:p-3 rounded-xl bg-slate-700/50 text-yellow-400 flex-1 sm:flex-none flex justify-center items-center">✨</button>
                        <button id="save-secret-btn" onclick="window.createSecret()" class="px-4 sm:px-8 py-3 bg-purple-600 text-white rounded-xl font-bold text-base sm:text-lg flex-2 sm:flex-none flex justify-center items-center gap-2">
                            <span>💾</span> <span id="save-btn-text">Сохранить</span>
                        </button>
                    </div>
                </div>
                <div id="edit-mode-indicator" class="hidden absolute top-0 right-0 bg-yellow-500/20 text-yellow-300 px-3 py-1 rounded-bl-xl rounded-tr-2xl text-xs sm:text-sm font-medium backdrop-blur-md">
                    ✏️ Редакт. <button onclick="window.cancelEdit()" class="ml-1 text-white">✖</button>
                </div>
            </div>

            <!-- Поиск -->
            <div class="flex items-center gap-2 sm:gap-4 bg-slate-800/50 p-2 rounded-xl sm:rounded-2xl border border-slate-700/30 shrink-0">
                 <div class="flex-1">
                    <input type="text" id="search-input" placeholder="🔍 Поиск..." class="w-full bg-slate-900/50 rounded-lg sm:rounded-xl px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base text-slate-200 focus:outline-none">
                </div>
                <button id="sort-btn" onclick="window.toggleSort()" class="p-2 sm:p-3 bg-slate-700/50 text-slate-300 rounded-lg sm:rounded-xl flex items-center justify-center">
                    <span id="sort-icon">⬇️</span>
                </button>
            </div>

            <!-- Список -->
            <div id="secrets-list" class="flex-1 overflow-y-auto space-y-3 sm:space-y-5 pb-4 pr-1"></div>
        </div>

        <!-- ЧАТ -->
        <div id="view-chat" class="flex-1 flex flex-col gap-4 hidden overflow-hidden">
            <div id="chat-messages" class="flex-1 bg-slate-800/80 rounded-2xl sm:rounded-3xl shadow-xl border border-slate-700/50 p-4 sm:p-6 overflow-y-auto flex flex-col gap-3 sm:gap-4">
                <div class="self-start bg-slate-700/80 text-slate-200 px-4 py-3 sm:px-6 sm:py-4 rounded-2xl sm:rounded-3xl rounded-tl-sm max-w-[90%] sm:max-w-[85%] text-sm sm:text-lg">
                    Привет! Я твой личный ИИ-дневник. 🤫
                </div>
            </div>
            
            <div class="bg-slate-800/80 p-2 sm:p-3 rounded-2xl sm:rounded-3xl shadow-xl flex gap-2 shrink-0">
                <input type="text" id="chat-input" placeholder="Сообщение..." class="flex-1 bg-transparent px-3 sm:px-6 py-2 sm:py-3 text-slate-200 focus:outline-none text-base sm:text-lg">
                <button id="chat-send-btn" class="px-5 py-2 sm:px-8 sm:py-3 bg-purple-600 text-white rounded-xl sm:rounded-2xl font-bold">🚀</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ЛОГИКА -->
    <script type="module">
        const isCloud = false; 
        
        // === КРИПТОГРАФИЯ ===
        const C_S = new Uint8Array([12, 54, 88, 23, 99, 105, 210, 45, 16, 78, 122, 233, 5, 9, 74, 11]);
        async function gCK(p) {
            const e = new TextEncoder();
            const km = await crypto.subtle.importKey("raw", e.encode(p), { name: "PBKDF2" }, false, ["deriveKey"]);
            return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: C_S, iterations: 100000, hash: "SHA-256" }, km, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
        }
        async function eD(t, k) {
            const e = new TextEncoder(); const iv = crypto.getRandomValues(new Uint8Array(12));
            const eC = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, k, e.encode(t));
            const eB = new Uint8Array(eC); const c = new Uint8Array(iv.length + eB.length);
            c.set(iv, 0); c.set(eB, iv.length); return btoa(String.fromCharCode(...c));
        }
        async function dD(b, k) {
            try {
                const cS = atob(b); const c = new Uint8Array(cS.length);
                for (let i = 0; i < cS.length; i++) c[i] = cS.charCodeAt(i);
                const iv = c.slice(0, 12); const eB = c.slice(12);
                const dC = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, k, eB);
                return new TextDecoder().decode(dC);
            } catch (e) { return null; }
        }

        // === ПЕРЕМЕННЫЕ И КЛЮЧ ===
        let s = []; let aK = null; let sC = 'bg-slate-700'; let clkI; let sK = 'safia_main'; let eSI = null; let sD = true; let lastEncryptedData = null;
        
        // 🚨 ВОТ ТУТ ВСТАВЬ СВОЙ НОВЫЙ КЛЮЧ AIza... МЕЖДУ КАВЫЧЕК 🚨
        const ak = "AIzaSyAe_d5_CxOyUYN6fVPoFr4AryX8_H0sw6k"; 
        
        // Самая новая модель
        const gu = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${ak}`;

        const lS = document.getElementById('lock-screen'); const fS = document.getElementById('fake-screen'); const mA = document.getElementById('main-app');
        const pI = document.getElementById('password-input'); const secI = document.getElementById('secret-input'); const secT = document.getElementById('secret-title');
        const sL = document.getElementById('secrets-list'); const seaI = document.getElementById('search-input');
        
        // === ТАЙМЕР ===
        let iT; const IL = 2 * 60 * 1000;
        function rIT() { clearTimeout(iT); if (aK) iT = setTimeout(window.hideVault, IL); }
        window.addEventListener('mousemove', rIT); window.addEventListener('keydown', rIT); window.addEventListener('touchstart', rIT); window.addEventListener('scroll', rIT);

        // === СОХРАНЕНИЕ И ВХОД ===
        async function sSTS() {
            if (!aK) return;
            try {
                const eDa = await eD(JSON.stringify(s), aK);
                lastEncryptedData = eDa; localStorage.setItem(sK, eDa);
            } catch (e) { console.error(e); }
        }

        async function attemptLogin() {
            const p = pI.value;
            if (p === 'сафия2016' || p === 'сафия0000') {
                sK = p === 'сафия0000' ? 'safia_decoy' : 'safia_main';
                document.title = p === 'сафия0000' ? "Заметки" : "Хранилище";
                aK = await gCK(p); s = []; lastEncryptedData = null;

                const localData = localStorage.getItem(sK);
                if (localData) {
                    lastEncryptedData = localData;
                    const dS = await dD(localData, aK);
                    if (dS) { try { s = JSON.parse(dS); } catch (err) { s = []; } }
                }
                
                rS(); lS.classList.add('opacity-0');
                setTimeout(() => {
                    lS.classList.add('hidden'); mA.classList.remove('opacity-0'); pI.value = ''; rIT();
                }, 300);
            } else {
                pI.classList.add('border-red-500', 'ring-2'); setTimeout(() => pI.classList.remove('border-red-500', 'ring-2'), 500);
            }
        }
        pI.addEventListener('keydown', async (e) => { if (e.key === 'Enter') attemptLogin(); });
        document.getElementById('mobile-login-btn').addEventListener('click', attemptLogin);

        window.hideVault = function() {
            fS.classList.remove('hidden', 'opacity-0'); sFC(); mA.classList.add('opacity-0');
            aK = null; s = []; eSI = null; lastEncryptedData = null;
            window.cancelEdit(); rS(); clearTimeout(iT);
            lS.classList.remove('hidden', 'opacity-0'); document.activeElement.blur(); document.title = "Вкладка";
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lS.classList.contains('hidden') && fS.classList.contains('hidden')) window.hideVault();
            if (e.ctrlKey && e.code === 'Space') window.hideVault();
        });

        document.getElementById('secret-return-btn').addEventListener('click', () => {
            fS.classList.add('opacity-0'); setTimeout(() => { fS.classList.add('hidden'); clearInterval(clkI); pI.focus(); }, 300);
        });

        function sFC() {
            const tE = document.getElementById('fake-time'); const dE = document.getElementById('fake-date');
            const uT = () => {
                const n = new Date(); tE.textContent = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                dE.textContent = n.toLocaleDateString('ru-RU', { weekday: 'long', month: 'long', day: 'numeric' });
            };
            uT(); clearInterval(clkI); clkI = setInterval(uT, 60000);
        }

        // === ИНТЕРФЕЙС ===
        document.querySelectorAll('.color-dot').forEach(d => {
            d.addEventListener('click', () => { document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active')); d.classList.add('active'); sC = d.dataset.color; });
        });

        // === УМНЫЙ ОБРАБОТЧИК ОШИБОК ИИ ===
        async function fWR(u, o, showAlert = false) {
            try {
                const res = await fetch(u, o);
                if (!res.ok) {
                    const errTxt = await res.text();
                    // Выводим ошибку прямо на экран, если включен показ
                    if (showAlert) {
                        alert("❌ ОШИБКА ОТ GOOGLE (Код " + res.status + "):\n\n" + errTxt + "\n\n💡 ПОДСКАЗКА: Включи VPN! Скорее всего, Google блокирует доступ из РФ.");
                    }
                    throw new Error(`Ошибка ${res.status}`);
                }
                return await res.json();
            } catch (e) {
                if (showAlert && !e.message.includes("Ошибка")) {
                    alert("❌ ОШИБКА СЕТИ:\nНе удалось подключиться к серверу ИИ. Убедись, что VPN работает!");
                }
                throw e;
            }
        }

        // Умное автоисправление при наборе (работает тихо, без алертов)
        let typingTimer;
        const doneTypingInterval = 2500;

        secI.addEventListener('input', () => {
            document.getElementById('char-count').textContent = secI.value.length;
            clearTimeout(typingTimer);
            if (secI.value.trim().length > 3) {
                typingTimer = setTimeout(smartAutoFix, doneTypingInterval);
            }
        });

        async function smartAutoFix() {
            const t = secI.value.trim();
            if (!t || !ak) return; 
            const statusInd = document.getElementById('auto-fix-status');
            statusInd.classList.remove('hidden');
            
            try {
                const prompt = "Исправь грамматику, орфографию и порядок слов так, чтобы звучало естественно (например 'я казени живу' -> 'Я живу в Казани'). Верни ТОЛЬКО исправленный текст без кавычек и комментариев:\n\n" + t;
                const data = await fWR(gu, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }, false); // false = без всплывающих окон
                
                if (data && data.candidates && data.candidates[0].content.parts[0].text) { 
                    const fixedText = data.candidates[0].content.parts[0].text.trim();
                    if (fixedText !== t && fixedText.length > 0) {
                        secI.value = fixedText;
                        document.getElementById('char-count').textContent = secI.value.length;
                    }
                }
            } catch (e) { console.error("Auto-fix error", e); } 
            finally { statusInd.classList.add('hidden'); }
        }

        // Кнопка ✨ (Показывает ошибку, если сломалось)
        document.getElementById('ai-fix-btn').addEventListener('click', async () => {
            const t = secI.value.trim(); 
            if (!t) { alert("Сначала напиши текст в поле!"); return; }
            if (!ak || ak === "") { alert("Ошибка! Вы не вставили ключ API в код."); return; }
            
            const b = document.getElementById('ai-fix-btn'); const oI = b.innerHTML; b.innerHTML = `⏳`;
            try {
                const prompt = "Исправь грамматику, орфографию и смысл текста (например 'я казени живу' -> 'Я живу в Казани'). Верни ТОЛЬКО исправленный текст:\n\n" + t;
                const data = await fWR(gu, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }, true); // true = показать ошибку
                if (data && data.candidates) { 
                    secI.value = data.candidates[0].content.parts[0].text.trim(); 
                    document.getElementById('char-count').textContent = secI.value.length; 
                }
            } catch (e) { console.error(e); } 
            finally { b.innerHTML = oI; }
        });

        // === ОСТАЛЬНОЙ КОД (Сохранение, Вкладки, Чат) ===
        window.createSecret = async function() {
            const t = secI.value.trim(); const ti = secT.value.trim();
            if (t) {
                if (eSI) { s = s.map(x => x.id === eSI ? { ...x, title: ti, text: t, color: sC, edited: true } : x); window.cancelEdit(); } 
                else { s.unshift({ id: Date.now(), title: ti, text: t, color: sC, pinned: false, date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'2-digit'}) }); }
                secI.value = ''; secT.value = ''; document.getElementById('char-count').textContent = '0'; rS(); await sSTS();
            }
        }

        window.deleteSecret = async function(id) { if (confirm('Удалить?')) { s = s.filter(x => x.id !== id); if (eSI === id) window.cancelEdit(); rS(); await sSTS(); } }
        
        window.editSecret = function(id) {
            const x = s.find(y => y.id === id);
            if (x) {
                secT.value = x.title || ''; secI.value = x.text; eSI = id;
                document.getElementById('save-btn-text').textContent = 'Обновить'; document.getElementById('edit-mode-indicator').classList.remove('hidden');
                document.getElementById('char-count').textContent = secI.value.length;
                document.querySelectorAll('.color-dot').forEach(d => { d.classList.remove('active'); if (d.dataset.color === x.color) d.classList.add('active'); });
                sC = x.color; document.getElementById('view-diary').scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.togglePin = async function(id) { const x = s.find(y => y.id === id); if (x) { x.pinned = !x.pinned; rS(); await sSTS(); } }

        window.cancelEdit = function() {
            eSI = null; document.getElementById('save-btn-text').textContent = 'Сохранить'; document.getElementById('edit-mode-indicator').classList.add('hidden');
            secT.value = ''; secI.value = ''; document.getElementById('char-count').textContent = '0';
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); document.querySelector('.color-dot[data-color="bg-slate-700"]').classList.add('active'); sC = 'bg-slate-700';
        }

        window.toggleSort = function() { sD = !sD; document.getElementById('sort-icon').textContent = sD ? '⬇️' : '⬆️'; rS(seaI.value); }
        
        window.exportSecrets = async function() {
            if (!aK || !lastEncryptedData) return;
            try { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([lastEncryptedData], { type: 'application/json' })); a.download = `safia_${Date.now()}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); } catch (e) {}
        }

        window.importSecrets = async function(f) {
            if (!f || !aK) return;
            if (confirm('Заменить всё?')) {
                const r = new FileReader();
                r.onload = async (e) => {
                    try { const dS = await dD(e.target.result, aK); if (!dS) throw new Error(); s = JSON.parse(dS); rS(); await sSTS(); } catch (err) {}
                    document.getElementById('import-file').value = '';
                }; r.readAsText(f);
            }
        }

        function rS(fT = '') {
            sL.innerHTML = '';
            let f = s.filter(x => x.text.toLowerCase().includes(fT.toLowerCase()) || (x.title && x.title.toLowerCase().includes(fT.toLowerCase())));
            f.sort((a, b) => { if (a.pinned !== b.pinned) return a.pinned ? -1 : 1; return sD ? b.id - a.id : a.id - b.id; });
            if (f.length === 0) return;
            f.forEach(x => {
                const d = document.createElement('div');
                d.className = `${x.color} p-4 sm:p-5 rounded-2xl border border-white/10 shadow-xl relative ${x.pinned ? 'pinned-glow' : ''}`;
                d.innerHTML = `
                    <div class="flex justify-between items-start mb-2 sm:mb-3 opacity-80 text-xs sm:text-sm">
                        <span>📅 ${x.date} ${x.edited ? '(изм.)' : ''}</span>
                        <div class="flex gap-2">
                            <button onclick="window.togglePin(${x.id})" class="text-white hover:opacity-70">${x.pinned ? '📍' : '📌'}</button>
                            <button onclick="window.editSecret(${x.id})" class="text-white hover:opacity-70">✏️</button>
                            <button onclick="window.deleteSecret(${x.id})" class="text-red-400 hover:opacity-70">✖</button>
                        </div>
                    </div>
                    ${x.title ? `<h3 class="font-bold text-lg sm:text-xl mb-1 sm:mb-2 text-white">${x.title}</h3>` : ''}
                    <p class="whitespace-pre-wrap text-sm sm:text-base text-slate-100">${x.text}</p>`;
                sL.appendChild(d);
            });
        }

        seaI.addEventListener('input', (e) => rS(e.target.value));

        let sR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (sR) {
            const r = new sR(); r.lang = 'ru-RU'; r.continuous = false; r.interimResults = false;
            const mB = document.getElementById('mic-btn');
            mB.addEventListener('click', () => { mB.classList.add('mic-active'); r.start(); });
            r.onresult = (e) => { secI.value += (secI.value ? ' ' : '') + e.results[0][0].transcript; document.getElementById('char-count').textContent = secI.value.length; };
            r.onend = () => mB.classList.remove('mic-active'); r.onerror = () => mB.classList.remove('mic-active');
        } else { document.getElementById('mic-btn').style.display = 'none'; }

        const tD = document.getElementById('tab-diary'); const tC = document.getElementById('tab-chat');
        const vD = document.getElementById('view-diary'); const vC = document.getElementById('view-chat');

        tD.addEventListener('click', () => { tD.classList.add('active'); tD.classList.remove('text-slate-400'); tC.classList.remove('active'); tC.classList.add('text-slate-400'); vD.classList.remove('hidden'); vC.classList.add('hidden'); });
        tC.addEventListener('click', () => { tC.classList.add('active'); tC.classList.remove('text-slate-400'); tD.classList.remove('active'); tD.classList.add('text-slate-400'); vC.classList.remove('hidden'); vD.classList.add('hidden'); });

        const chI = document.getElementById('chat-input'); const cM = document.getElementById('chat-messages');

        function aCM(t, iU) {
            const d = document.createElement('div');
            d.className = `px-4 sm:px-6 py-3 sm:py-4 rounded-2xl sm:rounded-3xl max-w-[90%] sm:max-w-[85%] shadow-md text-sm sm:text-lg leading-relaxed ${iU ? 'self-end bg-purple-600 text-white rounded-tr-sm' : 'self-start bg-slate-700/80 text-slate-200 rounded-tl-sm'}`;
            d.textContent = t; cM.appendChild(d); cM.scrollTop = cM.scrollHeight;
        }

        async function sCh() {
            const t = chI.value.trim(); if (!t || !ak) return; chI.value = ''; aCM(t, true);
            const lI = 'load-' + Date.now(); const lD = document.createElement('div'); lD.id = lI;
            lD.className = 'self-start bg-slate-700/50 text-slate-400 px-4 py-3 rounded-2xl rounded-tl-sm animate-pulse text-sm';
            lD.textContent = '...'; cM.appendChild(lD); cM.scrollTop = cM.scrollHeight;
            try {
                const data = await fWR(gu, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] }) }, true); // true = показать ошибку
                document.getElementById(lI).remove(); if (data && data.candidates) aCM(data.candidates[0].content.parts[0].text, false);
            } catch (e) { document.getElementById(lI).remove(); }
        }

        document.getElementById('chat-send-btn').addEventListener('click', sCh);
        chI.addEventListener('keydown', (e) => { if (e.key === 'Enter') sCh(); });

    </script>
</body>
</html>
